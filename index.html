<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>検索ポータル</title>

<style>
body {
    font-family: sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
}

.container {
    width: 650px;
    text-align: left;
}

input, button, select {
    padding: 8px;
    margin: 4px 0;
    font-size: 14px;
}

.category {
    margin: 15px 0;
}

.hidden {
    display: none;
}
</style>
</head>

<body>
<div class="container">

<h2>🔍 検索ポータル</h2>

<input id="q" placeholder="検索..." autofocus>
<br>

<div id="main"></div>

<button onclick="toggleSettings()">⚙️ 設定</button>

<div id="settings" class="hidden">

<h3>デフォルト検索</h3>
<select id="defaultSelect"></select>

<h3>追加</h3>
<input id="name" placeholder="名前">
<input id="url" placeholder="URL（?q=付き）">
<input id="cat" placeholder="カテゴリ">
<button onclick="add()">追加</button>

<h3>削除</h3>
<div id="deleteList"></div>

<h3>設定保存</h3>
<button onclick="exportConfig()">config書き出し</button>
<input type="file" onchange="importConfig(event)">

<h3>HTML生成</h3>
<button onclick="generateHTML()">HTMLダウンロード</button>

</div>

</div>

<script>
const defaultData = {
    "検索エンジン": {
        "Google": "https://www.google.com/search?q=",
        "Yahoo!": "https://search.yahoo.co.jp/search?p=",
        "DuckDuckGo": "https://duckduckgo.com/?q=",
        "DuckDuckGo Lite": "https://lite.duckduckgo.com/lite?q="
    },
    "動画・SNS": {
        "YouTube": "https://www.youtube.com/results?search_query="
    },
    "ショッピング": {
        "Amazon": "https://www.amazon.co.jp/s?k=",
        "Yahoo!ショッピング": "https://shopping.yahoo.co.jp/search?p=",
        "ヤフーフリマ": "https://paypayfleamarket.yahoo.co.jp/search/",
        "メルカリ": "https://jp.mercari.com/search?keyword="
    },
    "地図": {
        "Googleマップ": "https://www.google.com/maps/search/",
        "Yahoo!地図": "https://map.yahoo.co.jp/search?q="
    },
    "辞書・翻訳": {
        "Google翻訳": "https://translate.google.com/?text=",
        "Wikipedia": "https://ja.wikipedia.org/wiki/",
        "Yahoo!知恵袋": "https://chiebukuro.yahoo.co.jp/search?p="
    }
};

let state = JSON.parse(localStorage.getItem("portal_v3")) || {
    data: defaultData,
    defaultEngine: "Google"
};

function save() {
    localStorage.setItem("portal_v3", JSON.stringify(state));
}

function draw() {
    const main = document.getElementById("main");
    main.innerHTML = "";

    for (let cat in state.data) {
        if (Object.keys(state.data[cat]).length === 0) continue;

        let div = document.createElement("div");
        div.className = "category";

        let title = document.createElement("div");
        title.textContent = cat;
        div.appendChild(title);

        for (let name in state.data[cat]) {
            let btn = document.createElement("button");
            btn.textContent = name;
            btn.onclick = () => go(state.data[cat][name]);
            div.appendChild(btn);
        }

        main.appendChild(div);
    }

    drawDelete();
    drawSelect();
}

function go(url) {
    let q = document.getElementById("q").value.trim();
    if (q) location.href = url + encodeURIComponent(q);
}

function add() {
    let n = name.value.trim();
    let u = url.value.trim();
    let c = cat.value.trim() || "カスタム";

    if (!state.data[c]) state.data[c] = {};

    if (n && u) {
        state.data[c][n] = u;
        save();
        draw();
    }
}

function drawDelete() {
    let div = document.getElementById("deleteList");
    div.innerHTML = "";

    for (let cat in state.data) {
        for (let name in state.data[cat]) {
            let b = document.createElement("button");
            b.textContent = `削除: ${name}`;
            b.onclick = () => {
                delete state.data[cat][name];
                save();
                draw();
            };
            div.appendChild(b);
        }
    }
}

function drawSelect() {
    let sel = document.getElementById("defaultSelect");
    sel.innerHTML = "";

    for (let cat in state.data) {
        for (let name in state.data[cat]) {
            let opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            if (name === state.defaultEngine) opt.selected = true;
            sel.appendChild(opt);
        }
    }

    sel.onchange = () => {
        state.defaultEngine = sel.value;
        save();
    };
}

function toggleSettings() {
    document.getElementById("settings").classList.toggle("hidden");
}

document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        for (let cat in state.data) {
            if (state.data[cat][state.defaultEngine]) {
                go(state.data[cat][state.defaultEngine]);
                break;
            }
        }
    }
});

// config書き出し
function exportConfig() {
    let blob = new Blob([JSON.stringify(state)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "config.json";
    a.click();
}

// config読み込み
function importConfig(e) {
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = () => {
        state = JSON.parse(reader.result);
        save();
        draw();
    };

    reader.readAsText(file);
}

// HTML生成
function generateHTML() {
    let html = `
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>検索ポータル</title>
</head>
<body>
<input id="q">
<div id="main"></div>

<script>
let data = ${JSON.stringify(state.data)};
let defaultEngine = "${state.defaultEngine}";

function go(url){
 let q=document.getElementById("q").value;
 if(q) location.href=url+encodeURIComponent(q);
}

let main=document.getElementById("main");
for(let cat in data){
 let d=document.createElement("div");
 d.innerHTML="<b>"+cat+"</b><br>";
 for(let n in data[cat]){
  let b=document.createElement("button");
  b.textContent=n;
  b.onclick=()=>go(data[cat][n]);
  d.appendChild(b);
 }
 main.appendChild(d);
}

document.getElementById("q").addEventListener("keydown",e=>{
 if(e.key==="Enter"){
  for(let c in data){
   if(data[c][defaultEngine]){
    go(data[c][defaultEngine]);
    break;
   }
  }
 }
});
<\/script>

</body>
</html>
`;

    let blob = new Blob([html], {type:"text/html"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "portal.html";
    a.click();
}

draw();
</script>

</body>
</html>
